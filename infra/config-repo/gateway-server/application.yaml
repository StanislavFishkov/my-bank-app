server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,env
  endpoint:
    health:
      show-details: always

spring:
  output:
    ansi:
      enabled: ALWAYS
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://keycloak:9090/realms/mba
  cloud:
    loadbalancer:
      cache:
        enabled: true
        ttl: 2s
      health-check:
        interval: 5s
    gateway:
      server:
        webflux:
          httpclient:
            connect-timeout: 2000
            response-timeout: 5s
            pool:
              max-idle-time: 15s
              max-life-time: 60s
          default-filters:
            - StripPrefix=2
            - TokenRelay=
          routes:
            - id: accounts_service_route
              uri: lb://accounts
              predicates:
                - Path=/api/v1/accounts/**