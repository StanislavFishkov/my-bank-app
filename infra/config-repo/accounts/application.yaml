server:
#  TODO: установить 0
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,env
  endpoint:
    health:
      show-details: always

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/accounts_db
    username: root
    password: root
  sql:
    init:
      mode: always
  output:
    ansi:
      enabled: ALWAYS
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090/realms/mba
      client:
        provider:
          keycloak:
            issuer-uri: http://localhost:9090/realms/mba # Адрес сервера авторизации для получения токена
        registration:
          mba-accounts: # Описание клиента OAuth2
            provider: keycloak
            authorizationGrantType: client_credentials
            client-id: mba-accounts
            client-secret: SKiR96V4VHEE1KgtCRV8DTVWBfi8ZRzV
            scope: profile
            clientAuthenticationMethod: client_secret_post # Способ передачи секрета