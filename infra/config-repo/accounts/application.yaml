server:
  port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,env
    health:
      show-details: always

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/accounts_db
    username: root
    password: root
  sql:
    init:
      mode: always
  output:
    ansi:
      enabled: ALWAYS
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true