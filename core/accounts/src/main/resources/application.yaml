spring:
  application:
    name: accounts
  config:
    import: "consul:"
  cloud:
    consul:
      host: localhost
      port: 8500
      discovery:
        enabled: true
        prefer-ip-address: true
        health-check-interval: 10s
        instance-id: "${spring.application.name}:${random.value}"
      config:
        enabled: true
        prefixes: config
        defaultContext: application
        format: yaml